name: Run Login Script

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 8 * *"  # 每月8号运行
  push:
    branches:
      - main

jobs:
  login:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # ⭐ 必须：允许 push time.txt

    steps:
      - name: Checkout 仓库代码
        uses: actions/checkout@v2

      - name: 安装 Playwright 所需依赖
        run: |
          npx playwright install-deps

      - name: 设置 Python 环境
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright aiofiles requests

      - name: Install Playwright Browsers  # 安装浏览器
        run: |
          playwright install

      - name: 运行登录脚本
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBHOST: ${{ secrets.WEBHOST }}
        run: |
          python login_script.py

      # ================= 新增 step =================
      - name: 🕒 Keep Actions Alive (time.txt)
        if: always()
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S')" > time.txt
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add time.txt
          git commit -m "chore: update time.txt to keep actions alive" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
